<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            text-align: center;
        }
        #top {
            margin-top: 15px;
        }
        #webcam-container {
            margin: 10px auto;
            width: 220px;
        }
        #countdown {
            font-size: 32px;
            font-weight: bold;
            color: red;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
        }
    </style>
</head>

<body>

<h1>Rock Paper Scissors</h1>

<!-- ===== TOP AREA: Start Button + Webcam ===== -->
<div id="top">
    <div>Teachable Machine Image Model</div>
    <button type="button" onclick="init()">Start</button>
    <div id="webcam-container"></div>
</div>

<div id="label-container"></div>

<hr>

<!-- ===== GAME CONTROLS ===== -->
<button onclick="startRound()">Confirm Move</button>
<div id="countdown">Ready</div>

<p><strong>Your Choice:</strong> <span id="playerChoice">-</span></p>
<p><strong>Computer Choice:</strong> <span id="computerChoice">-</span></p>
<p><strong>Round Result:</strong> <span id="winner">-</span></p>

<p><strong>Score:</strong>
    You <span id="playerScore">0</span> :
    <span id="computerScore">0</span> Computer
</p>

<!-- ===== TEACHABLE MACHINE SCRIPTS ===== -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ========== YOUR SNIPPET ==========
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(200, 200, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        let bestProb = 0;
        let bestClass = "";
        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction = prediction[i].className + ": " + prediction[i].probability.toFixed(2);
            labelContainer.childNodes[i].innerHTML = classPrediction;

            if (prediction[i].probability > bestProb) {
                bestProb = prediction[i].probability;
                bestClass = prediction[i].className;
            }
        }
        currentPrediction = bestClass; // store the highest-confidence prediction
    }

    // ========== GAME LOGIC ==========
    let currentPrediction = "";
    let playerScore = 0;
    let computerScore = 0;

    function startRound() {
        let time = 3;
        document.getElementById("countdown").innerText = time;

        const timer = setInterval(() => {
            time--;
            document.getElementById("countdown").innerText = time;

            if (time === 0) {
                clearInterval(timer);
                playRound();
            }
        }, 1000);
    }

    function playRound() {
        const player = currentPrediction;
        const computer = randomChoice();

        document.getElementById("playerChoice").innerText = player;
        document.getElementById("computerChoice").innerText = computer;

        const result = getWinner(player, computer);
        document.getElementById("winner").innerText = result;

        document.getElementById("playerScore").innerText = playerScore;
        document.getElementById("computerScore").innerText = computerScore;

        document.getElementById("countdown").innerText = "Ready";
    }

    function randomChoice() {
        const choices = ["Rock", "Paper", "Scissors"];
        return choices[Math.floor(Math.random() * 3)];
    }

    function getWinner(player, computer) {
        if (player === computer) return "Tie";

        if (
            (player === "Rock" && computer === "Scissors") ||
            (player === "Paper" && computer === "Rock") ||
            (player === "Scissors" && computer === "Paper")
        ) {
            playerScore++;
            return "You Win";
        } else {
            computerScore++;
            return "Computer Wins";
        }
    }
</script>

</body>
</html>
